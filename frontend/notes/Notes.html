<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Anotações - Synapse</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="Notes.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="logo">Synapse</div>
      <div class="nav-menu">
        <a href="../workout/Workout.html" class="nav-item active"><span>🏋️</span> Treino</a>
				<a href="../chat/Chat.html" class="nav-item"><span>💬</span> Chat</a>
				<a href="../history/History.html" class="nav-item"><span>📊</span> Histórico</a>
				<a href="../notes/Notes.html" class="nav-item"><span>📝</span> Notas</a>
				<a href="../profile/Profile.html" class="nav-item"><span>👤</span> Perfil</a>
      </div>
    </nav>
    <div class="main-content">
      <header class="header"><div class="brand">Synapse</div></header>
      <main class="container">
        <!-- Left Panel - Notes List -->
        <div class="notes-list-panel">
          <!-- Header -->
          <div class="notes-header">
            <div class="notes-header-top">
              <h1>Anotações</h1>
              <button class="btn-icon">+</button>
            </div>

            <!-- Search -->
            <div class="search-box">
              <input id="search" placeholder="Buscar anotações..." class="search-input" />
            </div>

            <!-- Category Filter -->
            <div class="category-filter" id="filters">
              <div class="chip" data-cat="all">Todas</div>
              <div class="chip" data-cat="anatomico">Anatômico</div>
              <div class="chip" data-cat="psicologico">Psicológico</div>
              <div class="chip" data-cat="treino">Treino</div>
              <div class="chip" data-cat="geral">Geral</div>
            </div>
          </div>

          <!-- Notes List -->
          <div id="notesList" class="notes-list"></div>
        </div>

        <!-- Right Panel - Note Detail -->
        <div class="notes-detail-panel">
          <div id="detail" class="detail-content">
            <div class="empty-state">
              <div class="empty-icon">📄</div>
              <p>Selecione uma anotação para visualizar</p>
            </div>
          </div>
        </div>
      </div>
  </div>
  <script src="Notes.js"></script>
  </body>
  </html>
