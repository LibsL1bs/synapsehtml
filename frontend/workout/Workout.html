<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Treino - Synapse</title>

        <link rel="stylesheet" href="../styles.css" />
        <link rel="stylesheet" href="Workout.css" />

        <style>
            .exercise-name {
                border: none;
                font-size: 16px;
                font-weight: 600;
                margin-left: 6px;
                background: transparent;
                outline: none;
            }
        </style>
    </head>

    <body>
        <div class="layout">
            <nav class="sidebar">
                <div class="logo">Synapse</div>

                <div class="nav-menu">
                    <a href="../workout/Workout.html" class="nav-item active"><span>🏋️</span> Treino</a>
                    <a href="../chat/Chat.html" class="nav-item"><span>💬</span> Chat</a>
                    <a href="../history/History.html" class="nav-item"><span>📊</span> Histórico</a>
                    <a href="../notes/Notes.html" class="nav-item"><span>📝</span> Notas</a>
                    <a href="../profile/Profile.html" class="nav-item"><span>👤</span> Perfil</a>
                </div>
            </nav>

            <div class="main-content">
                <header class="header">
                    <div class="brand">Synapse</div>
                </header>

                <main class="container">
                    <div class="mt-12 flex-between mb-12">
                        <h1>Novo Treino</h1>

                        <div>
                            <button id="startBtn" class="btn">Iniciar Treino</button>
                            <button id="finishBtn" class="btn success ml-8 hidden">Finalizar</button>
                        </div>
                    </div>

                    <div id="timer" class="timer">00:00:00</div>

                    <div id="exList"></div>

                    <div class="mt-12">
                        <button id="addEx" class="btn outline">Adicionar Exercício</button>
                    </div>
                </main>
            </div>
        </div>

        <div
            id="noExerciseModal"
            class="modal hidden"
            role="dialog"
            aria-modal="true"
            aria-labelledby="noExerciseModalMessage"
        >
            <div class="modal-content">
                <p id="noExerciseModalMessage">Adicione um exercicio antes de iniciar o timer</p>
                <button id="closeModalBtn" class="btn outline">Entendi</button>
            </div>
        </div>

        <script src="Workout.js"></script>
    </body>
</html>
