<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Synapse - Login</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="Login.css">
</head>
<body>
  <div class="split">
    <aside class="left">
      <div class="brand">Synapse</div>
      <h1 class="title">Sua IA para <span class="gradient-text">Powerlifting</span></h1>
      <p class="muted intro">Memória robusta sobre seu perfil psicológico e anatômico. Treinos personalizados e acompanhamento inteligente.</p>
    </aside>

    <main class="right">
      <div class="card">
        <div class="mb-16">
          <h2 class="section-title">Entrar</h2>
          <p class="muted no-margin">Acesse sua conta para continuar treinando</p>
        </div>

          <form id="loginForm">
          <div class="mb-12">
            <label class="label">E-mail</label>
            <input id="email" type="email" required placeholder="seu@email.com" class="field" />
          </div>

          <div class="mb-12">
            <label class="label">Senha</label>
              <div class="relative">
              <input id="password" type="password" required placeholder="••••••••" class="field" />
              <button type="button" id="togglePwd" class="toggle">Mostrar</button>
            </div>
          </div>

            <div class="mt-8">
            <button id="submitBtn" class="btn" type="submit">Entrar</button>
            <span id="loading" class="loading">Entrando...</span>
          </div>
        </form>

        <p class="muted mt-14">Não tem uma conta? <a href="Signup.html" class="link-primary">Cadastre-se</a></p>
      </div>
    </main>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const pwd = document.getElementById('password');
    const toggle = document.getElementById('togglePwd');
    const loading = document.getElementById('loading');

    toggle.addEventListener('click', ()=>{
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    });

    form.addEventListener('submit', (e)=>{
      e.preventDefault();
      loading.style.display = 'inline-block';
      setTimeout(()=>{ loading.style.display = 'none'; alert('Login simulado — redirecionando'); window.location.href='Chat.html'; },900);
    });
  </script>
</body>
</html>
