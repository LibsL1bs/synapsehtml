<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Histórico de Treinos - Synapse</title>

        <link rel="stylesheet" href="../styles.css" />
        <link rel="stylesheet" href="History.css" />
    </head>

    <body>
        <div class="layout">
            <nav class="sidebar">
                <div class="logo">Synapse</div>

                <div class="nav-menu">
                    <a href="../workout/Workout.html" class="nav-item"> <span>🏋️</span> Treino </a>

                    <a href="../chat/Chat.html" class="nav-item"> <span>💬</span> Chat </a>

                    <a href="../history/History.html" class="nav-item active"> <span>📊</span> Histórico </a>

                    <a href="../notes/Notes.html" class="nav-item"> <span>📝</span> Notas </a>

                    <a href="../profile/Profile.html" class="nav-item"> <span>👤</span> Perfil </a>
                </div>
            </nav>

            <div class="main-content">
                <header class="header">
                    <div class="brand">Synapse</div>
                </header>

                <main class="container">
                    <h1>Histórico de Treinos</h1>

                    <div class="stats" style="margin-top: 12px">
                        <div class="stat">
                            <div id="statTreinos" style="font-size: 20px; font-weight: 700">0</div>
                            <div style="font-size: 12px; color: #666">Treinos</div>
                        </div>

                        <div class="stat">
                            <div id="statVolume" style="font-size: 20px; font-weight: 700">0t</div>
                            <div style="font-size: 12px; color: #666">Volume Total</div>
                        </div>

                        <div class="stat">
                            <div id="statDuracao" style="font-size: 20px; font-weight: 700">0h</div>
                            <div style="font-size: 12px; color: #666">Duração Média</div>
                        </div>
                    </div>

                    <div class="list" id="historyList"></div>
                </main>
            </div>
        </div>

        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <span id="closeModal" class="close">&times;</span>

                <h2>Detalhes do Treino</h2>

                <div id="modalContent"></div>
            </div>
        </div>

        <script src="History.js"></script>
    </body>
</html>
